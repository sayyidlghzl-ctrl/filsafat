<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url(https://img.freepik.com/vektor-gratis/latar-belakang-gelombang-bentuk-potongan-kertas-abstrak_474888-4649.jpg?semt=ais_hybrid&w=740&q=80);
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100dvb;
            display: flex;
            align-items: center;
            justify-content: center;
        }



        .abl {
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;

        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            width: 360px;

        }

        .icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #0fb528);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 1px 20px rgba(18, 37, 123, 0.4);
        }

        .icon svg {
            width: 22px;
            height: 22px;
            stroke: white;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .sub {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            height: 46px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #1a1a2e;
            outline: none;
            margin-bottom: 16px;
            background: #f9fafb;
            transition: border-color 0.2s, box-shadow 0.5s;
        }

        input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2);
        }

        .row {
            display: flex;
            justify-content: flex-end;
            margin-top: -8px;
            margin-bottom: 24px;
        }

        .row a {
            font-size: 13px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        button {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #0fb528);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #9ca3af;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>


    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
        </div>

        <h1>Selamat datang!</h1>
        <p class="sub">Masuk untuk melanjutkan</p>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="nama@email.com">

        <label for="password">Kata Sandi</label>
        <input type="password" id="password" placeholder="••••••••">

        <div class="row">
            <a href="#">Lupa kata sandi?</a>
        </div>

        <button onclick="login()">Masuk →</button>

        <p class="footer">Belum punya akun? <a href="#">Daftar sekarang</a></p>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (!email || !pass) { alert('Isi email dan kata sandi dulu ya!'); return; }
            // Ganti dengan halaman tujuan:
            alert('Login berhasil!');
            window.location.href = 'filsafat.html';
            // window.location.href = 'dashboard.html';
        }
    </script>

</body>

</html>
